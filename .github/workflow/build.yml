name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter psycopg2-binary

    - name: Build EXE with PyInstaller
      run: pyinstaller --onefile --windowed Radsport_Koch_fertig.py

    - name: Upload EXE File
      uses: actions/upload-artifact@v4
      with:
        name: Radsport-Koch-Windows-App
        path: dist/Radsport_Koch_fertig.exe